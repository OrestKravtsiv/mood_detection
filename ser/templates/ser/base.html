<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Speech Emotion Recognition{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .emotion-badge {
            font-size: 1.4rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .spectrogram-img { width: 100%; border-radius: 8px; }
        .chart-container { position: relative; height: 260px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'ser:upload' %}">🎙️ SER</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'ser:upload' %}">Upload</a>
            <a class="nav-link" href="{% url 'ser:history' %}">History</a>
        </div>
    </div>
</nav>
<div class="container pb-5">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
